services:
  - type: web
    name: pardogo
    runtime: node
    plan: starter
    buildCommand: npm install --omit=dev
    startCommand: npm run start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: CANONICAL_BASE_URL
        sync: false
      - key: CANONICAL_REDIRECT_HOSTS
        value: pardogo.onrender.com
      - key: CORS_ORIGIN
        value: https://pardogo-8yn0.onrender.com,https://pardogo.onrender.com
      - key: ADMIN_INITIAL_PHONE
        value: admin
      - key: ADMIN_INITIAL_PASSWORD
        sync: false
      - key: FORCE_HTTPS
        value: "1"
      - key: TRUST_PROXY
        value: "1"
      - key: DB_PATH
        value: /var/data/pardogo.sqlite
    disk:
      name: pardogo-data
      mountPath: /var/data
      sizeGB: 1
